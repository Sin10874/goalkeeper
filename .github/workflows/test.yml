name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck
        run: shellcheck -S error core/check-goal.sh wrapper/goalkeeper-run.sh install.sh test/run.sh
      - name: Run tests
        run: bash test/run.sh
